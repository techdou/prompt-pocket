name: Release

# 发版 workflow：打 tag 时触发，tauri-action 自动 build + 上传到 GitHub Release
#
# 触发：push 形如 v2.0.3、v1.2.3 的 tag
#   git tag v2.0.3
#   git push origin v2.0.3
#
# 与 ci.yml 区别：
#   ci.yml 每次 push/PR 都跑（验证用，debug build）
#   release.yml 只在打 tag 时跑（产 release 包，release build + 上传）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 支持手动触发（GitHub 页面点 Run workflow）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    permissions:
      contents: write   # tauri-action 需要写权限创建 Release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon（M1+，覆盖当前主流 Mac）
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # Windows x64
          - platform: 'windows-latest'
            args: ''
          # Linux x64
          - platform: 'ubuntu-22.04'
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 需要额外的目标架构（aarch64）
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # tauri-action：build + 自动创建/上传 GitHub Release
      # tagName 用 git 推上来的 tag 本身（v2.0.3），releaseName/releaseBody 自定义
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0.5.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }} — Prompt Pocket'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
